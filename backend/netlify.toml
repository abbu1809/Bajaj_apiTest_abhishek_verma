[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/tickets/*"
  to = "/.netlify/functions/api/tickets/:splat"
  status = 200

[[redirects]]
  from = "/tickets"
  to = "/.netlify/functions/api/tickets"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
